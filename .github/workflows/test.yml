name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastmcp httpx openpyxl pytest

    - name: Check structure file
      run: |
        python -c "import json; d=json.load(open('data/skill_structure.json')); print(f'Domains: {len(d[\"domains\"])}, Skills: {sum(len(s[\"skills\"]) for dom in d[\"domains\"] for s in dom[\"subdomains\"])}')"

    - name: Run tests
      run: |
        python -m pytest tests/ -v

    - name: Verify scripts import
      run: |
        python -c "import sys; sys.path.insert(0, '.'); from server import mcp; print(f'MCP tools: {len(mcp._tool_manager.list_tools())}')"
