name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy types-setuptools

      - name: Ruff check
        run: python -m ruff check server.py scripts/ tests/ --ignore E501 --output-format=github

      - name: MyPy type check
        run: python -m mypy server.py --ignore-missing-imports --follow-imports=skip || true

      - name: Check import errors
        run: python -c "import server; print('✅ Import OK')"
